name: Release

# GitOps: every push to main lets release-please maintain a Release PR.
# Merging that PR creates a release and publishes via OIDC — no tags, no tokens.
on:
  push:
    branches: [main]

# release-please needs contents + PR write; the publish job needs id-token (OIDC).
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    # Comradery64/.github, pinned by commit SHA.
    uses: Comradery64/.github/.github/workflows/npm-release.yml@4d801babc41ba3f715523b1f43e23cde4ed0a7dc # v2
