name: Release

on:
  push:
    tags: ["v*"]

# OIDC: no npm token. The reusable workflow needs id-token:write, and a caller
# can only grant permissions it holds — so declare them here too.
permissions:
  contents: read
  id-token: write

jobs:
  release:
    # Comradery64/.github, pinned by commit SHA.
    uses: Comradery64/.github/.github/workflows/npm-release.yml@d1dbf206cf411027bf8b11e587bd1499f7a9d6fb # v1
