name: Release

# GitOps: every push to main lets release-please maintain a Release PR. Merging it creates
# the release, which fires the inline publish job below via OIDC — no tags, no tokens.
on:
  push:
    branches: [main]

permissions:
  contents: write # release-please: create release + tag
  pull-requests: write # release-please: maintain the Release PR
  id-token: write # publish: OIDC trusted publishing + provenance

jobs:
  prepare:
    # release-please (shared), pinned by commit SHA.
    uses: Comradery64/.github/.github/workflows/npm-release.yml@1161ad4b72983d043db6adb53ef40c27c346691d # v3

  publish:
    needs: prepare
    if: ${{ needs.prepare.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    # Runs in THIS repo so npm Trusted Publishing accepts the OIDC identity.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck --if-present
      - run: npm test --if-present
      - run: npm run build --if-present
      - run: npm publish --provenance --access public
