name: Release

# Self-contained GitOps release. Every push to main lets release-please maintain a
# Release PR (version + CHANGELOG from Conventional Commits). Merging it creates the
# release, which fires the inline publish job via npm OIDC Trusted Publishing +
# provenance — no tags to cut, no tokens. Publish runs in THIS repo so npm's trusted
# publisher (repo=gcp-seeder, workflow=release.yml) accepts the OIDC identity.
on:
  push:
    branches: [main]

jobs:
  # Gate: the release/tag is only ever created if the checks pass. This keeps
  # GitHub (release + tag) and npm from diverging — a red main produces neither
  # a release nor a publish, so there is no window for a version mismatch.
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run typecheck --if-present
      - run: npm test --if-present
      - run: npm run build --if-present

  release-please:
    needs: checks # no release/tag unless the checks above are green
    runs-on: ubuntu-latest
    permissions:
      contents: write # create release + tag
      pull-requests: write # maintain the Release PR
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          release-type: node

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck --if-present
      - run: npm test --if-present
      - run: npm run build --if-present
      - run: npm publish --provenance --access public
